name: CI

# Both domains must be green before a PR to dev/main can merge (docs/08 §CI).
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------------
  # Backend (ff_dashboard): the Python analytics BFF.
  #
  # ff_dashboard imports ff_pipeline (Phase 1) via the editable path source in
  # pyproject.toml ([tool.uv.sources] -> ../danger-zone). CI checks that sibling
  # out beside this repo so the source resolves. We pin its `dev` branch so the
  # dashboard integrates against ff-pipeline's integration branch (matching this
  # repo's own dev-targeted flow); bump to `main` when ff-pipeline promotes a
  # release. If you'd rather not grant access to the sibling, swap
  # [tool.uv.sources] to the pinned git tag (see docs/PHASE2_RUNBOOK.md) and drop
  # the "Check out ff-pipeline" step.
  # ----------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out ff-pipeline (sibling, for the editable path source)
        uses: actions/checkout@v4
        with:
          repository: ocmooch/danger-zone
          ref: dev
          path: danger-zone
          ssh-key: ${{ secrets.FF_PIPELINE_DEPLOY_KEY }}
      - name: Position ff-pipeline as ../danger-zone
        run: mv danger-zone ../danger-zone
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Skip the post-job cache prune; its teardown intermittently exits 2
          # and red-marks an otherwise-green run.
          prune-cache: false
      - run: uv sync --extra dev
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy src/
      - run: uv run pytest

  # ----------------------------------------------------------------------------
  # Frontend (web/): component + feature tests, build, and contract-drift check.
  # ----------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # `npm run build` is `tsc --noEmit && vite build`, so it is the type gate;
      # a separate `npm run typecheck` step would just compile tsc twice.
      - run: npm run test
      - run: npm run build

  # The contract-seam + e2e job lives in its own workflow (e2e.yml) so it can be
  # path-scoped: it's the heaviest job and is irrelevant to docs-only changes.
