name: e2e

# Contract seam + e2e: boots the real BFF on the fixture DB (serving the built
# SPA single-origin) and runs the deterministic journeys plus the
# visual-regression snapshot spec. It's the heaviest job (browser install +
# build), so it's split out of ci.yml and path-scoped to the code that can
# actually change its outcome — never docs-only or memory changes. e2e is not a
# required check, so a path-skip can't deadlock a PR.
on:
  push:
    branches: [main, dev]
    paths: &e2e-paths
      - "web/**"
      - "src/ff_dashboard/**"
      - "scripts/serve_e2e.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main, dev]
    paths: *e2e-paths

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ff_dashboard imports ff_pipeline (Phase 1) via the editable path source in
  # pyproject.toml ([tool.uv.sources] -> ../danger-zone). We check the sibling
  # out beside this repo so the source resolves (see ci.yml's backend job for
  # the full rationale and the git-tag alternative).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out ff-pipeline (sibling)
        uses: actions/checkout@v4
        with:
          repository: ocmooch/danger-zone
          ref: dev
          path: danger-zone
          ssh-key: ${{ secrets.FF_PIPELINE_DEPLOY_KEY }}
      - run: mv danger-zone ../danger-zone
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        working-directory: web
        run: npm ci

      # Contract drift: the committed typed client must match the live schema.
      - name: API client in sync with the live BFF schema
        run: |
          uv run dz-dashboard serve &
          # http-get:// forces a GET probe; /health is GET-only and 405s on
          # wait-on's default HEAD, which would never report ready.
          npx --yes wait-on http-get://127.0.0.1:8800/health
          cd web && npm run gen:api:check

      # End-to-end journeys and visual snapshots against the fixture DB
      # (Playwright's webServer builds the SPA and boots scripts/serve_e2e.py on
      # :8810).
      - name: Install Playwright browser + system deps
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run Playwright e2e and visual specs
        working-directory: web
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
